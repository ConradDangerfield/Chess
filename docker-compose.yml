version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    image: <BACKEND_IMAGE>:<TAG>
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      MONGO_URL: "mongodb://mongo:27017"
      DB_NAME: "chess_app"
      CORS_ORIGINS: "*"
    ports:
      - "8001:8001"

  frontend:
    image: <FRONTEND_IMAGE>:<TAG>
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mongo_data:
