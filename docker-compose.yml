services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    expose:
      - "27017"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      MONGO_URL: "mongodb://mongo:27017"
      DB_NAME: "chess_app"
      CORS_ORIGINS: "https://chess.conraddangerfield.com,https://discord.com,https://*.discord.com,https://*.discordsays.com"
      DISCORD_CLIENT_ID: "${DISCORD_CLIENT_ID}"
      DISCORD_CLIENT_SECRET: "${DISCORD_CLIENT_SECRET}"
    expose:
      - "8001"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.chess-backend.rule=Host(`chess.conraddangerfield.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.chess-backend.entrypoints=websecure"
      - "traefik.http.routers.chess-backend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.chess-backend.priority=10"
      - "traefik.http.services.chess-backend.loadbalancer.server.port=8001"
      - "traefik.http.middlewares.chess-discord.headers.customresponseheaders.Content-Security-Policy=frame-ancestors https://discord.com https://*.discord.com https://*.discordsays.com"
      - "traefik.http.middlewares.chess-discord.headers.customresponseheaders.X-Frame-Options="
      - "traefik.http.routers.chess-backend.middlewares=chess-discord"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.chess-frontend.rule=Host(`chess.conraddangerfield.com`)"
      - "traefik.http.routers.chess-frontend.entrypoints=websecure"
      - "traefik.http.routers.chess-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.chess-frontend.priority=1"
      - "traefik.http.services.chess-frontend.loadbalancer.server.port=80"
      - "traefik.http.middlewares.chess-frontend-discord.headers.customresponseheaders.Content-Security-Policy=frame-ancestors https://discord.com https://*.discord.com https://*.discordsays.com"
      - "traefik.http.middlewares.chess-frontend-discord.headers.customresponseheaders.X-Frame-Options="
      - "traefik.http.routers.chess-frontend.middlewares=chess-frontend-discord"

volumes:
  mongo_data:
